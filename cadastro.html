<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" ="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>content
</head>
<body>
    <header>
        <h1>🔥 Cadastro</h1>
        <p>Bottom text</p> <br>
        <nav>
            <a href="index.html">Voltar</a>
        </nav>
    </header>
    <main>
        <form action="#" method="post" class="cadastro">
            <fieldset>
                <label for="nome">Nome Completo:</label>
                <input type="text" name="nome" required>
            </fieldset>
            <fieldset>
                <label for="email">E-mail:</label>
                <input type="email" name="email" placeholder="exemplo@gmail.com" required>
            </fieldset>
            <fieldset>
                <label for="telefone">Telefone:</label>
                <input type="tel" name="telefone" placeholder="(00) 00000-0000">
            </fieldset>
            <fieldset>
                <label for="senha">Senha:</label>
                <input type="password" name="senha" required>
            </fieldset>
            <fieldset>
                <label for="nascimento">Data de Nascimento:</label>
                <input type="date" name="nascimento">
            </fieldset>
            <fieldset>
                <label>Cadastro de Endereço</label>
                <input type="text" id="cep" placeholder="Digite o seu CEP">
                <input type="text" id="rua" placeholder="Rua">
                <input type="text" id="bairro" placeholder="Bairro">
                <input type="text" id="cidade" placeholder="Cidade">
                <input type="text" id="estado" placeholder="Estado">
            </fieldset>
            <fieldset>
                <label>Gênero:</label>
                <label class="radio-group"><input type="radio" name="genero" value="masculino"> Masculino</label>
                <label class="radio-group"><input type="radio" name="genero" value="feminino"> Feminino</label>
                <label class="radio-group"><input type="radio" name="genero" value="nao-informar"> Prefiro não informar</label>
            </fieldset>
            <fieldset>
                <label>Interesses / Áreas de Conhecimento:</label>
                <label class="checkbox-group"><input type="checkbox" name="interesses" value="programacao"> Programação</label>
                <label class="checkbox-group"><input type="checkbox" name="interesses" value="design"> Design</label>
                <label class="checkbox-group"><input type="checkbox" name="interesses" value="redes"> Redes</label>
                <label class="checkbox-group"><input type="checkbox" name="interesses" value="banco-dados"> Banco de Dados</label>
                <label class="checkbox-group"><input type="checkbox" name="interesses" value="ia"> Inteligência Artificial</label>
            </fieldset>
            <fieldset>
                <label for="mensagem">Apresentação pessoal ou mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" placeholder="Conte um pouco sobre você..."></textarea>
            </fieldset>
            <fieldset>
                <label for="foto">Foto de Perfil:</label>
                <input class="cor_preta" type="file" id="foto" name="foto" accept="image/*">
            </fieldset>
            <button class="cor_preta" type="submit">Enviar Cadastro</button>
            <br>
            <button class="cor_preta" type="reset">Limpar Formulário</button>
        </form>
    </main>
    <footer class="contato">
        <h2>Dados de contatos</h2>
        <p>Telefone: 4002-8922</p>
        <p>Endereço: Peatonal Primera Cda. Cuicacalli 10, Estrella del Sur, Iztapalapa, 09820 Ciudad de México, CDMX, México</p>
        <p>&copy; direito autorais mamelo</p>
    </footer>
    <script src="script_login.js"></script>
</body>
</html>
